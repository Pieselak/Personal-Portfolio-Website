                - generic [ref=e51]:
                  - paragraph [ref=e52]: Portfolio Website with Glucose Sensor Integration
                  - paragraph [ref=e53]: "The project involves creating a modern portfolio website divided into four main sections: Home, About me, Projects, and Blood sugar. The purpose of the site is to present the individual, their experience, skills, and completed work, as well as to showcase an integration with a sensor that measures glucose levels, with the collected data being processed and displayed to the user. The frontend layer is built using Vite, React, and TypeScript, ensuring high performance, modular code structure, and clear application logic. TailwindCSS is used for styling, providing a lightweight, responsive, and easily extendable interface. Each section of the website serves a specific role: the Home page introduces the user and presents the most important information; About me describes the creator’s profile and experience; the Projects section showcases completed work; and the Blood sugar section enables the presentation of data gathered from the sensor. The backend is developed with NestJS and is responsible for communication with the sensor’s API. The server logic includes retrieving, processing, and securely providing the data to the frontend in an organized manner. Thanks to this architecture, the project is scalable, understandable, and ready for further development."
