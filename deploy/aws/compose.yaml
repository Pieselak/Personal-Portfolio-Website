name: portfolio

services:
  web:
    image: ${WEB_IMAGE:?Set WEB_IMAGE in .env}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:8080"
    depends_on:
      api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - portfolio

  api:
    image: ${API_IMAGE:?Set API_IMAGE in .env}
    pull_policy: always
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "2100"
      CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN in .env}
      DATABASE_URL: postgresql://${POSTGRES_USER:?Set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      REDIS_URL: redis://redis:6379
      REDIS_REQUIRED: ${REDIS_REQUIRED:-true}
      LIBRE_API_URL: ${LIBRE_API_URL:-https://api.libreview.io/llu}
      LIBRE_VERSION: ${LIBRE_VERSION:-4.16.0}
      LIBRE_PRODUCT: ${LIBRE_PRODUCT:-llu.android}
      LIBRE_EMAIL: ${LIBRE_EMAIL:-}
      LIBRE_PASSWORD: ${LIBRE_PASSWORD:-}
      LIBRE_ACCOUNT_ID: ${LIBRE_ACCOUNT_ID:-}
      DEXCOM_API_URL: ${DEXCOM_API_URL:-https://sandbox-api.dexcom.com}
      DEXCOM_API_VERSION: ${DEXCOM_API_VERSION:-v3}
      DEXCOM_CLIENT_ID: ${DEXCOM_CLIENT_ID:-}
      DEXCOM_CLIENT_SECRET: ${DEXCOM_CLIENT_SECRET:-}
      DEXCOM_REDIRECT_URI: ${DEXCOM_REDIRECT_URI:?Set DEXCOM_REDIRECT_URI in .env}
    ports:
      - "${API_PORT:-2100}:2100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - portfolio

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - portfolio

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    networks:
      - portfolio

networks:
  portfolio:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
